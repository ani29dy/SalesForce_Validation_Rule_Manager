# Render Blueprint — single web service (API + React UI)
# Root Directory on Render must be: backend

services:
  - type: web
    name: salesforce-validation-rule-manager
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm run build:render
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SF_LOGIN_URL
        value: https://login.salesforce.com
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      # Set both to your Render service URL, e.g. https://salesforce-validation-rule-manager-xxxx.onrender.com
      - key: SF_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Leave empty for same-origin API calls (recommended for single-service deploy)
      - key: VITE_API_URL
        value: ""
