# Render Blueprint — deploy both services from one repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API (deploy this first to get the service URL)
  - type: web
    name: validation-rule-manager-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SF_LOGIN_URL
        value: https://login.salesforce.com
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend static site (deploy after backend; set VITE_API_URL to backend URL)
  - type: web
    name: validation-rule-manager-ui
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
